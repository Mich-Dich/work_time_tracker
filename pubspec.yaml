name: work_time_manager
description: "A Flutter application for tracking work hours"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.5.3
  intl: ^0.20.2
  flutter_time_picker_spinner: ^2.0.0
  geolocator: ^11.0.1
  permission_handler: ^11.0.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/time.png"

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true